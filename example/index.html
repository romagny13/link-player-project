<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinkedEmbed — demo</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0f0f0f;
            color: #e8e8e8;
            padding: 2rem;
            line-height: 1.6;
        }

        h2 {
            font-size: .7rem;
            letter-spacing: .15em;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 1rem;
        }

        .link-list {
            display: flex;
            flex-wrap: wrap;
            gap: .5rem;
            margin-bottom: 1.25rem;
        }

        .link-list a[data-link] {
            display: inline-block;
            padding: .35rem .85rem;
            border: 1px solid #333;
            border-radius: 4px;
            color: #ccc;
            text-decoration: none;
            font-size: .85rem;
            transition: border-color .2s, color .2s;
        }

        .link-list a[data-link]:hover {
            border-color: #888;
            color: #fff;
        }

        /* ── embed container ── */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08),
                0 4px 12px rgba(0, 0, 0, 0.04);
            transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1),
                box-shadow 0.4s ease-out;
        }

        .video-container::before {
            content: "";
            display: block;
            padding-top: 56.25%;
            /* 16:9 Aspect Ratio */
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 12px;
            overflow: hidden;
            scrollbar-width: none;
        }

        .video-container:hover {
            transform: scale(1.02) translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1),
                0 5px 15px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
